<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VODY correct layout rev31</title>
<style>
:root{
  --blue:#2f5bff;
  --bg:#f3f6fb;
  --card:#fff;
  --line:#d9dee8;
  --soft:#eef4ff;
  --text:#061224;
  --muted:#5f6f86;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-size:17px;
}
.wrap{
  width:min(720px, calc(100vw - 24px));
  margin:24px auto 40px;
}
.logo{
  font-size:34px;
  font-weight:800;
  letter-spacing:-1.2px;
  color:var(--blue);
  line-height:1;
  margin-bottom:2px;
}
.slogan{
  color:var(--muted);
  font-size:13px;
  margin-bottom:12px;
}
input{
  width:100%;
  min-height:50px;
  border:1px solid var(--line);
  border-radius:13px;
  padding:9px 13px;
  font-size:23px;
  outline:none;
  background:#fff;
}
.input-row{
  display:grid;
  grid-template-columns:1fr 132px;
  gap:8px;
}
.controls{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:7px;
  margin:9px 0 12px;
}
button{
  min-height:46px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:13px;
  font-size:18px;
  font-weight:500;
  font-family:inherit;
  cursor:pointer;
}
button.active, button.primary{
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}
.answer-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}
.title{
  font-size:26px;
  font-weight:800;
  line-height:1.05;
  margin:0 0 10px;
}
.text{
  font-size:20px;
  line-height:1.34;
  white-space:pre-line;
  margin-bottom:14px;
}
.visual{
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  min-height:150px;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:8px;
  font-size:22px;
  text-align:center;
}
svg{
  width:100%;
  max-width:560px;
  height:auto;
  display:block;
}
.label{
  color:var(--muted);
  font-size:16px;
  margin:9px 0 5px;
}
.subtopic{
  display:grid;
  grid-template-columns:1fr 48px 48px;
  gap:7px;
  align-items:center;
  border:1px solid #b9cef9;
  background:var(--soft);
  border-radius:11px;
  padding:6px 8px 6px 12px;
  margin:6px 0;
}
.subtopic-name{
  font-size:18px;
  font-weight:400;
}
.subtopic button{
  min-height:34px;
  font-size:17px;
  border-radius:10px;
}
.reading{
  border:1px solid var(--line);
  background:#fff;
  border-radius:13px;
  padding:10px 12px;
  font-size:17px;
  margin-bottom:12px;
}
.reading a{
  color:#1357ff;
  text-decoration:none;
}
.reading a:hover{
  text-decoration:underline;
}
.navbox{
  border:1px solid var(--line);
  background:#fff;
  border-radius:13px;
  padding:10px 12px;
  min-height:48px;
  display:flex;
  align-items:center;
  gap:7px;
  flex-wrap:wrap;
  margin-bottom:8px;
}
.small-btn{
  min-height:31px;
  padding:4px 11px;
  font-size:16px;
  border-radius:10px;
}
.clear{
  width:100%;
  color:#5f6f86;
  min-height:44px;
}
.preset-toggle{
  width:100%;
  margin-top:10px;
  min-height:42px;
  font-size:17px;
}
.preset-panel{
  display:none;
  margin-top:8px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:13px;
  padding:10px;
}
.preset-panel.show{display:block}
.preset-grid{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}
.preset-grid button{
  font-size:15px;
  min-height:36px;
  padding:6px 10px;
  flex:0 0 auto;
}
.preset-grid button.selected{
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}
.preset-heading{
  color:var(--muted);
  font-size:14px;
  font-weight:700;
  margin:8px 0 5px;
}
.more{
  display:none;
  margin-top:8px;
  color:var(--muted);
  font-size:15px;
}
.more.show{display:block}
.empty{
  color:var(--muted);
  border:1px solid var(--line);
  background:#fff;
  border-radius:11px;
  padding:10px 12px;
}

.loan-box{
  border:1px solid var(--line);
  background:#fff;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
}
.loan-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:8px;
}
.loan-grid label{
  font-size:14px;
  color:var(--muted);
  display:block;
  margin-bottom:4px;
}
.loan-grid input{
  min-height:40px;
  font-size:18px;
  padding:7px 9px;
}
.loan-result{
  border-top:1px solid var(--line);
  padding-top:9px;
  margin-top:9px;
  font-size:18px;
  line-height:1.45;
}
.loan-link{
  display:block;
  margin-top:8px;
  color:#1357ff;
  text-decoration:none;
}
.loan-link:hover{text-decoration:underline;}

.memory-label{
  color:var(--muted);
  font-size:14px;
  font-weight:700;
  margin:8px 0 5px;
}
.visual.memory{
  min-height:92px;
  align-items:center;
  justify-content:center;
  font-weight:700;
  line-height:1.35;
  white-space:pre-line;
}
.pathline{
  color:var(--muted);
  font-size:15px;
  margin:8px 0 5px;
}
.pathline button{
  min-height:28px;
  padding:3px 8px;
  font-size:14px;
  border-radius:8px;
  margin:0 2px;
}
.map{
  border:1px solid var(--line);
  background:#fff;
  border-radius:13px;
  padding:10px;
  margin-bottom:12px;
}
.map-root,
.map-node,
.map-child{

  align-items:center;
  flex-wrap:wrap;
  gap:6px;
  margin:6px 0;
}
.map-root{
  padding-bottom:7px;
  border-bottom:1px solid var(--line);
}
.map-branch{
  margin:8px 0;
  padding:8px;
  border:1px solid #e3e7ef;
  border-radius:12px;
  background:#fafafa;
}
.map-children{
  margin-left:18px;
  padding-left:10px;
  border-left:2px solid #d5d9e2;
}
.map-topic{
  min-height:32px;
  padding:4px 10px;
  font-size:15px;
  border-radius:10px;
  background:#fff;
}
.map-topic.touched{
  background:#eeeeee;
  border-color:#c5c5c5;
}
.map-topic.current{
  background:#d9d9d9;
  border-color:#9a9a9a;

}
.map-level{

  border-radius:9px;
}
.map-level.touched{

<body>
<main class="wrap">
  <div class="logo">VODY <span class="revtag">rev31</span></div>
  <div class="slogan">Natural Learning Platform · Same Subject. Different Resolution.</div>

  <div class="input-row">
    <input id="topicInput" value="Interest rate" aria-label="Topic">
    <button id="newTopicBtn">New topic</button>
  </div>

  <div class="controls">
    <button id="b0" class="active">0</button>
    <button id="b1">1</button>
    <button id="b2">2</button>
    <button id="b3">3</button>
    <button id="answerBtn">Answer</button>
  </div>
  <div class="ai-status" id="aiStatus">AI: preset answer loaded</div>

  <section class="answer-card">
    <h1 class="title" id="title">Interest rate</h1>
    <div class="text" id="answerText"></div>
    <div class="visual memory" id="visual" style="display:none;"></div>
    <div id="specialBox"></div>
  </section>

  <div class="label">Knowledge map</div>
  <div class="map" id="knowledgeMap"></div>
  <div class="pathline" id="pathLine"></div>

  <div class="label">Related reading</div>
  <div class="reading" id="reading"></div>

  <button class="preset-toggle" id="presetToggle">Preset topics</button>
  <div class="preset-panel" id="presetPanel">
    <div class="preset-heading">Field / category</div>
    <div class="preset-grid" id="presetFields"></div>

    <div class="preset-heading">Topics</div>
    <div class="preset-grid" id="presetTopics"></div>

    <button class="preset-toggle" id="moreBtn">More</button>
    <div class="more" id="moreText">Later: topic of the day, source mode, and pro/con mode. Rev31 uses real AI only through the backend.</div>
  </div>
</main>

<script>
const AI_ENDPOINT = "/api/vody-answer";

function setAIStatus(message, isError = false){
  const el = document.getElementById("aiStatus");
  if(!el) return;
  el.textContent = message;
  el.classList.toggle("error", !!isError);
}

function levelName(n){
  return ["Intuition", "Familiarization", "Knowledge", "Expertise"][n] || "Level " + n;
}

function makeLiveNode(title){
  const n = node(
    title,
    "free",
    "Connecting to AI for Level 0...",
    "Connecting to AI for Level 1...",
    "Connecting to AI for Level 2...",
    "Connecting to AI for Level 3...",
    {}
  );
  n.live = true;
  n.aiLoaded = {};
  n.aiLoading = {};
  n.aiError = false;
  return n;
}

function buildChildrenFromSubtopics(subtopics){
  const children = {};
  (subtopics || []).slice(0,3).forEach(item=>{
    const title = typeof item === "string" ? item : (item.title || item.name || "Subtopic");
    const child = node(
      title,
      "free",
      `Connect this subtopic to one concrete scene: ${title}.`,
      `${title} is one important part of the larger topic.`,
      `${title} can be analyzed by its parts, rules, examples, and limits.`,
      `At expertise level, ${title} requires definitions, assumptions, evidence, and boundary cases.`,
      {}
    );
    child.live = true;
    child.aiLoaded = {};
    child.aiLoading = {};
    child.aiError = false;
    children[title] = child;
  });
  return children;
}

async function requestAIForCurrent(){
  const c = current();
  if(!c || !c.live || (c.aiLoaded && c.aiLoaded[level]) || (c.aiLoading && c.aiLoading[level])){
    render();
    return;
  }

  c.aiLoading[level] = true;
  c.aiError = false;
  c.levels[level] = `Asking AI for Level ${level}: ${levelName(level)}...`;
  render();
  setAIStatus("AI: requesting live answer...");

  try{
    const response = await fetch(AI_ENDPOINT, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        topic:c.title,
        level,
        path:path.map(p=>p.title)
      })
    });

    const data = await response.json().catch(()=>({}));
    if(!response.ok || !data.answer){
      throw new Error(data.error || "AI backend did not return an answer.");
    }

    c.levels[level] = data.answer;
    c.aiLoaded[level] = true;
    c.aiError = false;
    if(data.subtopics && Object.keys(c.children || {}).length === 0){
      c.children = buildChildrenFromSubtopics(data.subtopics);
    }
    setAIStatus("AI: live answer loaded");
  } catch(err){
    c.aiError = true;
    c.levels[level] = "AI connection failed. Check that the Rev31 backend is running and that OPENAI_API_KEY is set on the server. No fake browser answer is being shown.";
    setAIStatus("AI: connection failed", true);
  } finally {
    c.aiLoading[level] = false;
    render();
  }
}

function setLevel(n){
  level = n;
  const c = current();
  if(c && c.live && !(c.aiLoaded && c.aiLoaded[level])){
    requestAIForCurrent();
  } else {
    render();
  }
}

function autoLevel2(title){
  return `${title} can be studied by separating its parts, rules, conditions, and consequences.\nAt this level, focus on structure: what causes it, what it changes, where it applies, and what limits the simple explanation.`;
}

function autoLevel3(title){
  return `At expertise level, ${title} requires precise definitions, assumptions, boundary cases, and evidence.\nA strong expert answer compares models, quantifies effects when possible, and states where the explanation stops being valid.`;
}

function node(title, visual, l0, l1, arg5 = undefined, arg6 = undefined, arg7 = undefined){
  let l2, l3, children;

  if(arg5 && typeof arg5 === "object" && !Array.isArray(arg5)){
    l2 = autoLevel2(title);
    l3 = autoLevel3(title);
    children = arg5;
  } else {
    l2 = arg5 || autoLevel2(title);
    l3 = arg6 || autoLevel3(title);
    children = (arg7 && typeof arg7 === "object") ? arg7 : {};
  }

  return { title, visual, levels:[l0, l1, l2, l3], children };
}

const roots = {
  "interest rate": node(
    "Interest rate", "money",
    "You borrow $100 and in one year pay back $103.\nThe extra $3 is interest: the price of using money for time.\nIn this example, the interest rate is 3/100 = 0.03 = 3% per year.",
    "An interest rate is the price of borrowing money or the reward for saving money, usually written as a percent per year. If the rate is 3%, then $100 for one year produces $3 of interest. With compound interest for two years, the amount becomes $100 × 1.03 × 1.03 = $106.09.",
    {
      "Compound interest": node(
        "Compound interest", "save",
        "Money grows faster when interest is added back into the total.\nAfter the first year, the next year’s interest is calculated on the larger amount, so time makes the effect build up.",
        "Compound interest means interest is calculated on the current total, including previous interest. Time makes the effect grow strongly. On a $100,000 home loan, 5% costs about $27,279 interest over 10 years but about $75,377 over 25 years. At 5.5%, it becomes about $30,232 over 10 years and $84,226 over 25 years.",
        {
          "Interest on interest": node(
            "Interest on interest", "save",
            "After one year, $100 becomes $103.\nIn the second year, the 3% is calculated on $103, so the first $3 starts earning interest too.",
            "Interest on interest means previous interest becomes part of the new base. At 3%, $100 becomes $103 after one year, then $103 × 1.03 = $106.09 after the second year.",
            {}
          ),
          "Time effect": node(
            "Time effect", "save",
            "The longer interest has time to repeat, the more visible the growth becomes.\nOne year looks small; many years can become large.",
            "Time strongly affects compound interest because each period builds on the previous total. At the same rate, 25 years can create far more total interest than 10 years.",
            {}
          ),
          "Rate effect": node(
            "Rate effect", "save",
            "A half-percent difference can look small at first.\nOver a long loan, that small rate difference can become thousands of dollars.",
            "The rate effect means a small change in interest rate can create a large difference over many years. On a $100,000 loan for 25 years, 5% costs about $75,377 interest, while 5.5% costs about $84,226.",
            {}
          )
        }
      ),
      "Central bank rate": node(
        "Central bank rate", "bank",
        "A central bank is the bank for the banking system.\nWhen it changes its key rate, banks feel it first, and customer loan and savings rates often move after it.",
        "A central bank is a public institution that manages money and credit for a country or currency area. In the U.S., the central bank is the Federal Reserve. Its policy rate influences how expensive money is for banks, which then affects mortgage, loan, credit-card, and savings rates.",
        {
          "Rate history": node(
            "Rate history", "bank",
            "Central bank rates move up and down with economic conditions.\nIn U.S. history, rates were very high during inflation fights and very low during major crises.",
            "1913: Federal Reserve created. 1930s: low-rate environment. Early 1980s: near 20% at peak. 2008–2015: near 0%. 2020–2021: near 0%. 2022–2024: about 5%+.",
            {}
          ),
          "What affects the rate": node(
            "What affects the rate", "bank",
            "If prices rise too fast, the central bank may raise rates.\nIf the economy is weak, it may lower rates to make borrowing easier.",
            "Central bank rates are affected by inflation, employment, economic growth, credit stress, and financial stability. The same rate can be raised to cool the economy or lowered to support borrowing and spending.",
            {}
          ),
          "Customer loan rates": node(
            "Customer loan rates", "bank",
            "The central bank rate is not the rate most customers pay.\nBanks add risk, time, and profit margin, so customer loan rates are usually higher.",
            "Customer rates usually differ from the central bank rate. Savings rates are usually lower than loan rates. Mortgages are usually higher because they are long loans. Personal loans are higher because borrower risk is higher. Credit cards are often much higher because risk and flexibility are high.",
            {}
          )
        }

      "Calculate your loan": node(

        "Change the loan amount, rate, or years and the payment changes immediately.\nA longer loan lowers the monthly payment but usually makes total interest much larger.",
        "This estimate uses the standard fixed-payment loan formula. It gives a rough monthly payment, total paid, and total interest, but it does not include taxes, insurance, fees, adjustable rates, or lender-specific rules.",

  "integral": node(
    "Integral", "integral",
    "A curved shape is hard to measure at once.\nCut the area into many thin strips, add them, and the total becomes the integral idea.",
    "An integral measures accumulation. In the graph picture, it is the area under a curve. More formally, it is the limit of a sum: add many small pieces, then let the pieces become smaller and smaller.",
    {

        "Area under a curve", "integral",

        {
          "Thin strips": node(
            "Thin strips", "integral",

            "Thin strips approximate the area under a curve by using narrow rectangles. The thinner the strips, the closer the estimate can get.",

          ),
          "More strips": node(
            "More strips", "integral",
            "More strips follow the curve more closely.\nThe empty mismatch near the curve becomes smaller.",

            {}
          ),
          "Limit idea": node(
            "Limit idea", "integral",
            "Imagine the strips becoming thinner and thinner.\nThe stable value they approach is the integral.",
            "The limit idea means the integral is the value approached by the sums as the slice widths become smaller and smaller.",
            {}
          )
        }
      ),
      "Integral of velocity": node(
        "Integral of velocity", "math",
        "A car’s speed changes during a trip.\nIf you add all the tiny pieces of speed over time, you get how far the motion adds up.",
        "The integral of velocity over time gives displacement. If velocity stays positive, displacement equals distance traveled. If velocity becomes negative, the integral subtracts that part because the motion is in the opposite direction.",
        {
          "Distance traveled": node(
            "Distance traveled", "math",
            "If the car keeps moving forward, adding velocity over time gives the distance traveled.",
            "When velocity is positive, the integral of velocity over time gives the distance traveled over that time interval.",
            {}
          ),
          "Positive and negative velocity": node(
            "Positive and negative velocity", "math",
            "Forward motion can add, and backward motion can subtract.\nThe integral keeps track of direction.",
            "Positive velocity contributes positive area. Negative velocity contributes negative area, so the integral gives net displacement.",

          ),
          "Area under velocity graph": node(
            "Area under velocity graph", "math",
            "On a speed-time graph, the area under the graph represents how much motion accumulated.",
            "For a velocity-time graph, the area under the curve over a time interval gives displacement; if velocity is positive, it gives distance traveled.",

          )
        }
      ),
      "Definite integral": node(
        "Definite integral", "integral",
        "You choose a start point and an end point.\nA definite integral adds only what happens between those two limits.",
        "A definite integral gives one accumulated value between a lower limit and an upper limit. Unlike an indefinite integral, which gives a general function, a definite integral uses specific limits and returns one number.",
        {

            "The lower limit says where to start.\nThe upper limit says where to stop.",
            "Lower and upper limits define the interval over which the definite integral is calculated.",

          ),
          "Area under a parabola": node(

          ),
          "Distance from velocity graph": node(

function money(x){
  return "$" + Math.round(x).toLocaleString();
}

function calculateLoan(){
  const amount = Number(document.getElementById("loanAmount").value);
  const annualRate = Number(document.getElementById("loanRate").value) / 100;
  const years = Number(document.getElementById("loanYears").value);
  const n = years * 12;
  const r = annualRate / 12;

  if(!amount || !years || amount <= 0 || years <= 0){
    document.getElementById("loanResult").textContent = "Enter loan amount, rate, and years.";
    return;
  }

  let monthly;
  if(r === 0){
    monthly = amount / n;
  } else {
    monthly = amount * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
  }

  const totalPaid = monthly * n;
  const totalInterest = totalPaid - amount;

  document.getElementById("loanResult").innerHTML =
    `<b>Monthly payment:</b> ${money(monthly)}<br>` +
    `<b>Total paid:</b> ${money(totalPaid)}<br>` +
    `<b>Total interest:</b> ${money(totalInterest)}`;
}

  topicButton.onclick = () => {
    path = nodePath.slice();
    if(nodePath.length >= 2){
      collapsed[nodePath[0].title + "::" + nodePath[1].title] = false;
    }
    render();
  };
  wrap.appendChild(topicButton);

  [0,1,2,3].forEach(n=>{
    const b = document.createElement("button");
    const currentLevel = isCurrent && n === level;
    const touchedLevel = touched[nodeObj.title] && touched[nodeObj.title][n];
    b.className = "map-level" + (currentLevel ? " current" : (touchedLevel ? " touched" : ""));
    b.textContent = n;
    b.onclick = () => {
      path = nodePath.slice();
      if(nodePath.length >= 2){
        collapsed[nodePath[0].title + "::" + nodePath[1].title] = false;
      }
      setLevel(n);
    };
    wrap.appendChild(b);
  });

  return wrap;
}

function renderKnowledgeMap(){
  const box = document.getElementById("knowledgeMap");
  box.innerHTML = "";

  const rootNode = path[0];
  box.appendChild(nodeButton(rootNode, [rootNode], 0));

  Object.keys(rootNode.children || {}).forEach(childName=>{
    const child = rootNode.children[childName];
    const branch = document.createElement("div");
    branch.className = "map-branch";

    const grandchildren = Object.keys(child.children || {});
    const header = document.createElement("div");
    header.className = "map-node";

    if(grandchildren.length){
      const key = rootNode.title + "::" + child.title;
      if(collapsed[key] === undefined) collapsed[key] = true;
      const toggle = document.createElement("button");
      toggle.className = "map-toggle";
      toggle.textContent = collapsed[key] ? "›" : "⌄";
      toggle.onclick = () => {
        collapsed[key] = !collapsed[key];
        render();
      };
      header.appendChild(toggle);
    }

    const nodePart = nodeButton(child, [rootNode, child], 1);
    while(nodePart.firstChild){
      header.appendChild(nodePart.firstChild);
    }
    branch.appendChild(header);

    if(grandchildren.length){
      const key = rootNode.title + "::" + child.title;
      const childBox = document.createElement("div");
      childBox.className = "map-children" + (collapsed[key] ? " collapsed" : "");
      grandchildren.forEach(gcName=>{
        const gc = child.children[gcName];
        childBox.appendChild(nodeButton(gc, [rootNode, child, gc], 2));
      });
      branch.appendChild(childBox);
    }

    box.appendChild(branch);
  });
}

function renderPathLine(){
  const line = document.getElementById("pathLine");
  line.innerHTML = "";
  path.forEach((node, index)=>{
    if(index > 0){
      const sep = document.createElement("span");
      sep.textContent = "/";
      line.appendChild(sep);
    }
    const b = document.createElement("button");
    b.textContent = node.title;
    b.onclick = () => {
      path = path.slice(0, index + 1);
      render();
    };
    line.appendChild(b);
  });
}

function findNodeByTitle(title){
  const key = normalize(title);
  if(roots[key]) return { found:true, newPath:[roots[key]] };

  function search(node, trail){
    if(normalize(node.title) === key) return trail;
    for(const childName of Object.keys(node.children || {})){
      const child = node.children[childName];
      const result = search(child, trail.concat(child));
      if(result) return result;
    }
    return null;
  }

  for(const rootKey of Object.keys(roots)){
    const r = roots[rootKey];
    const result = search(r, [r]);
    if(result) return { found:true, newPath:result };
  }

  return { found:false };
}

function loadTopic(name){
  const requestedLevel = level;
  const displayName = (name || "New topic").trim() || "New topic";
  const result = findNodeByTitle(displayName);
  if(result.found){
    path = result.newPath;
    level = requestedLevel;
    render();
    return;
  }

  path = [makeLiveNode(displayName)];
  level = requestedLevel;
  requestAIForCurrent();
}

document.getElementById("b0").onclick = () => setLevel(0);
document.getElementById("b1").onclick = () => setLevel(1);
document.getElementById("b2").onclick = () => setLevel(2);
document.getElementById("b3").onclick = () => setLevel(3);
document.getElementById("answerBtn").onclick = () => loadTopic(document.getElementById("topicInput").value);
document.getElementById("newTopicBtn").onclick = () => {
  document.getElementById("topicInput").value = "";
  document.getElementById("knowledgeMap").innerHTML = "";
  document.getElementById("pathLine").innerHTML = "";
  document.getElementById("topicInput").focus();
};
document.getElementById("topicInput").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("answerBtn").click(); });
document.getElementById("presetToggle").onclick = () => document.getElementById("presetPanel").classList.toggle("show");
document.getElementById("moreBtn").onclick = () => document.getElementById("moreText").classList.toggle("show");

const presetData = {
  "Finance": ["Interest rate", "Inflation", "Mortgage"],
  "Law": ["Inheritance taxes in USA", "Contract", "Copyright"],
  "Math": ["Integral", "Derivative", "Probability"],
  "AI": ["Artificial intelligence", "Large language model", "AI hallucination"],
  "Technology": ["Computer chip", "Semiconductor", "3D printing"],
  "Mechanics": ["Non-holonomic mechanical systems", "Newton's laws", "Oscillation"],
  "Places": ["Portugal", "Japan", "California"],
  "Culture": ["Renaissance", "Modern art", "Architecture"],
  "Literature": ["To Kill a Mockingbird", "War and Peace", "Hamlet"],
  "Media": ["Stranger Things", "Star Wars", "The Matrix"]
};

let selectedPresetField = "Finance";

function renderPresetFields(){
  const box = document.getElementById("presetFields");
  box.innerHTML = "";

  Object.keys(presetData).forEach(field=>{
    const b = document.createElement("button");
    b.textContent = field;
    b.className = field === selectedPresetField ? "selected" : "";
    b.onclick = () => {
      selectedPresetField = field;
      renderPresetFields();
      renderPresetTopics();
    };
    box.appendChild(b);
  });
}

function renderPresetTopics(){
  const box = document.getElementById("presetTopics");
  box.innerHTML = "";

  presetData[selectedPresetField].forEach(topicName=>{
    const b = document.createElement("button");
    b.textContent = topicName;
    b.onclick = () => {
      loadTopic(topicName);
      document.getElementById("presetPanel").classList.remove("show");
    };
    box.appendChild(b);
  });
}

renderPresetFields();
renderPresetTopics();

render();
</script>
